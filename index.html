<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma Adrian</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login">
    <div class="login-box" id="telaLogin">
      <h2>Entrar</h2>
      <input id="email" type="email" placeholder="E-mail">
      <input id="senha" type="password" placeholder="Senha">
      <button onclick="login()">Acessar</button>
      <p style="text-align:center; margin-top:10px; font-size:14px;"><span onclick="recuperarSenha()" style="color:#2e7d32; cursor:pointer; font-weight:bold;">Esqueci minha senha</span></p>
      <p style="text-align:center; margin-top:15px; font-size:14px;">Novo aqui? <span onclick="mostrarCadastro()" style="color:#2e7d32; cursor:pointer; font-weight:bold;">Solicitar</span></p>
    </div>

    <div class="login-box" id="telaCadastro" style="display:none;">
      <h2>Cadastro</h2>
      <input id="nomeCadastro" type="text" placeholder="Nome">
      <input id="emailCadastro" type="email" placeholder="E-mail">
      <input id="senhaCadastro" type="password" placeholder="Crie uma senha">
      <input id="confirmarSenhaCadastro" type="password" placeholder="Confirme a senha">
      <button onclick="cadastrar()">Cadastrar</button>
      <button class="secondaryBtn" onclick="voltarLogin()" style="width:100%; margin-top:10px;">Voltar</button>
    </div>
  </div>

  <div id="app" style="display:none;">
    <aside class="sidebar">
      <button onclick="mostrar('menu')"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></button>
      <button onclick="mostrar('cursos')"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></button>
      <button onclick="mostrar('perfil')"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></button>
      <div style="flex:1"></div>
      <button onclick="logout()" style="color:#dc2626"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
    </aside>

    <main class="conteudo">
      <div id="menu">
        <h1>Dashboard</h1>
        <div class="dashboardGrid">
          <div class="card"><h3>Progresso</h3><p id="progresso">0%</p></div>
          <div class="card"><h3>Concluídas</h3><p id="concluidos">0</p></div>
        </div>
      </div>
      <div id="cursos" style="display:none;"></div>
      <div id="perfil" style="display:none;">
        <div class="card" style="max-width:500px;">
          <h2>Perfil</h2>
          <p id="nomeUser"></p>
          <p id="emailUser"></p>

          <h3 style="margin-top:20px;">Alterar senha</h3>
          <input id="novaSenha" type="password" placeholder="Nova senha" style="width:100%; padding:12px; margin-top:10px; border:1px solid #d1d5db; border-radius:10px;">
          <input id="confirmarNovaSenha" type="password" placeholder="Confirmar nova senha" style="width:100%; padding:12px; margin-top:10px; border:1px solid #d1d5db; border-radius:10px;">
          <button class="primaryBtn" onclick="alterarSenha()" style="margin-top:10px;">Salvar nova senha</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>

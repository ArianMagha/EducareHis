<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Plataforma</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login">
    <div class="login-box" id="telaLogin">
      <h2>Bem-vindo</h2>
      <p class="subtexto">Acesse sua conta para continuar</p>
      <input id="email" type="email" placeholder="Seu e-mail">
      <input id="senha" type="password" placeholder="Sua senha">
      <button onclick="login()">Entrar na plataforma</button>
      <p class="troca-tela">Não tem acesso? <span onclick="mostrarCadastro()">Solicitar cadastro</span></p>
    </div>

    <div class="login-box" id="telaCadastro" style="display:none;">
      <h2>Cadastro</h2>
      <p class="subtexto">Preencha os dados abaixo</p>
      <input id="nomeCadastro" type="text" placeholder="Nome completo">
      <input id="emailCadastro" type="email" placeholder="E-mail principal">
      <button onclick="cadastrar()">Enviar solicitação</button>
      <p class="troca-tela">Já possui conta? <span onclick="voltarLogin()">Fazer login</span></p>
    </div>
  </div>

  <div id="app" style="display:none;">
    <aside class="sidebar">
      <button onclick="mostrar('menu')" title="Dashboard">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      </button>
      <button onclick="mostrar('cursos')" title="Cursos">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      </button>
      <button onclick="mostrar('perfil')" title="Perfil">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </button>
      <div style="flex:1"></div>
      <button onclick="logout()" title="Sair" style="color:#dc2626">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </aside>

    <main class="conteudo">
      <div id="menu">
        <h2 style="margin-bottom:24px;">Dashboard</h2>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
            <div class="card-estatistica">
                <span class="badge">Em andamento</span>
                <p id="progresso">0%</p>
                <small>Progresso Geral</small>
            </div>
            <div class="card-estatistica">
                <span class="badge" style="background:#dcfce7; color:#166534">Concluído</span>
                <p id="concluidos">0</p>
                <small>Aulas Finalizadas</small>
            </div>
        </div>
      </div>

      <div id="cursos" style="display:none;">
          </div>

      <div id="perfil" style="display:none;">
          <div class="login-box" style="max-width: 600px; text-align: left;">
              <h2>Meu Perfil</h2>
              <div style="margin: 20px 0; padding-bottom: 15px; border-bottom: 1px solid #eee;">
                  <p><strong>Nome:</strong> <span id="nomeUser"></span></p>
                  <p><strong>E-mail:</strong> <span id="emailUser"></span></p>
              </div>
              <h3>Segurança</h3>
              <input id="novaSenha" type="password" placeholder="Nova senha">
              <button onclick="alterarSenha()">Atualizar Senha</button>
          </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>

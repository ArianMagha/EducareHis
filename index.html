<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma Adrian - Mackenzie</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login">
    <div class="login-box" id="telaLogin">
      <h2>Entrar na Área</h2>
      <input id="email" type="email" placeholder="E-mail">
      <input id="senha" type="password" placeholder="Senha">
      <button onclick="login()">Acessar Agora</button>
      <p style="text-align:center; margin-top:20px; font-size:14px; color:#666;">
        Não possui conta? <span onclick="mostrarCadastro()" style="color:#2e7d32; cursor:pointer; font-weight:700;">Solicitar Cadastro</span>
      </p>
    </div>

    <div class="login-box" id="telaCadastro" style="display:none;">
      <h2>Solicitar Cadastro</h2>
      <input id="nomeCadastro" type="text" placeholder="Seu Nome Completo">
      <input id="emailCadastro" type="email" placeholder="Seu Melhor E-mail">
      <button onclick="cadastrar()">Enviar Solicitação</button>
      <button class="secondaryBtn" onclick="voltarLogin()" style="width:100%; margin-top:10px;">Voltar ao Login</button>
    </div>
  </div>

  <div id="app" style="display:none;">
    <aside class="sidebar">
      <button onclick="mostrar('menu')" title="Dashboard">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      </button>
      <button onclick="mostrar('cursos')" title="Meus Cursos">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      </button>
      <button onclick="mostrar('perfil')" title="Meu Perfil">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </button>
      <div style="flex:1"></div>
      <button onclick="logout()" style="color:#dc2626" title="Sair">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </aside>

    <main class="conteudo">
      <div id="menu">
        <h1 style="margin-bottom:10px;">Olá, <span id="nomeUser"></span>!</h1>
        <p style="color:#666; margin-bottom:30px;">Bem-vindo à sua trilha de aprendizagem.</p>
        <div class="dashboardGrid">
          <div class="card">
            <span class="badge">Estatística</span>
            <h3 style="color:#666; font-size:14px;">Seu Progresso</h3>
            <p id="progresso" style="font-size:32px; font-weight:700; color:#2e7d32;">0%</p>
          </div>
          <div class="card">
            <span class="badge">Conquistas</span>
            <h3 style="color:#666; font-size:14px;">Aulas Concluídas</h3>
            <p id="concluidos" style="font-size:32px; font-weight:700; color:#2e7d32;">0</p>
          </div>
        </div>
      </div>

      <div id="cursos" style="display:none;"></div>

      <div id="perfil" style="display:none;">
        <div class="card" style="max-width:500px;">
          <h2>Meu Perfil</h2>
          <p style="margin:10px 0;"><strong>E-mail:</strong> <span id="emailUser"></span></p>
          <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
          <h3>Segurança</h3>
          <p style="font-size:13px; color:#666; margin-bottom:10px;">Altere sua senha de acesso abaixo:</p>
          <input type="password" id="novaSenha" placeholder="Nova Senha" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
          <button class="primaryBtn" onclick="alterarSenha()" style="width:100%;">Atualizar Senha</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
